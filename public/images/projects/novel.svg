<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Browser window -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="#1a1a1a"/>
  <rect x="20" y="20" width="360" height="40" rx="8" fill="#2a2a2a"/>
  <circle cx="35" cy="35" r="6" fill="#ff5f57"/>
  <circle cx="55" cy="35" r="6" fill="#ffbd2e"/>
  <circle cx="75" cy="35" r="6" fill="#28ca42"/>

  <!-- Content area -->
  <rect x="20" y="60" width="360" height="220" fill="url(#cardBg)"/>

  <!-- Mock content -->
  <rect x="40" y="80" width="80" height="20" rx="4" fill="#e9ecef"/>
  <rect x="40" y="110" width="120" height="12" rx="2" fill="#dee2e6"/>
  <rect x="40" y="130" width="100" height="12" rx="2" fill="#dee2e6"/>

  <!-- Cards -->
  <rect x="40" y="160" width="140" height="80" rx="8" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <rect x="50" y="170" width="30" height="15" rx="2" fill="#0071e3"/>
  <rect x="50" y="190" width="80" height="8" rx="2" fill="#6c757d"/>
  <rect x="50" y="205" width="60" height="8" rx="2" fill="#6c757d"/>

  <rect x="200" y="160" width="140" height="80" rx="8" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <rect x="210" y="170" width="30" height="15" rx="2" fill="#28a745"/>
  <rect x="210" y="190" width="80" height="8" rx="2" fill="#6c757d"/>
  <rect x="210" y="205" width="60" height="8" rx="2" fill="#6c757d"/>
</svg>