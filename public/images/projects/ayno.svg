<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="uiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="componentBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.98" />
      <stop offset="100%" style="stop-color:#fdfdfe;stop-opacity:0.98" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#uiBg)"/>

  <!-- UI Components -->
  <rect x="30" y="30" width="340" height="240" rx="12" fill="url(#componentBg)"/>

  <!-- Header -->
  <rect x="50" y="50" width="80" height="20" rx="4" fill="#6366f1"/>
  <rect x="50" y="80" width="120" height="8" rx="2" fill="#9ca3af"/>
  <rect x="50" y="95" width="100" height="8" rx="2" fill="#9ca3af"/>

  <!-- Buttons -->
  <rect x="50" y="120" width="60" height="30" rx="15" fill="#6366f1"/>
  <rect x="120" y="120" width="60" height="30" rx="15" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <rect x="190" y="120" width="60" height="30" rx="15" fill="#10b981"/>

  <!-- Cards Grid -->
  <rect x="50" y="170" width="100" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="80" cy="195" r="12" fill="#f59e0b"/>
  <rect x="70" y="210" width="20" height="6" rx="1" fill="#6b7280"/>

  <rect x="170" y="170" width="100" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="200" cy="195" r="12" fill="#ef4444"/>
  <rect x="190" y="210" width="20" height="6" rx="1" fill="#6b7280"/>

  <rect x="290" y="170" width="100" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="320" cy="195" r="12" fill="#8b5cf6"/>
  <rect x="310" y="210" width="20" height="6" rx="1" fill="#6b7280"/>
</svg>