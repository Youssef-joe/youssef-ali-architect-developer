<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dataBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:0.95" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#dataBg)"/>

  <!-- Dashboard -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="url(#chartBg)"/>

  <!-- Header -->
  <rect x="40" y="40" width="100" height="16" rx="3" fill="#1e293b"/>
  <rect x="40" y="65" width="150" height="10" rx="2" fill="#64748b"/>

  <!-- Chart area -->
  <rect x="40" y="90" width="320" height="120" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Mock chart bars -->
  <rect x="60" y="150" width="15" height="40" fill="#3b82f6"/>
  <rect x="85" y="130" width="15" height="60" fill="#10b981"/>
  <rect x="110" y="140" width="15" height="50" fill="#f59e0b"/>
  <rect x="135" y="120" width="15" height="70" fill="#ef4444"/>
  <rect x="160" y="135" width="15" height="55" fill="#8b5cf6"/>
  <rect x="185" y="125" width="15" height="65" fill="#06b6d4"/>
  <rect x="210" y="145" width="15" height="45" fill="#84cc16"/>
  <rect x="235" y="115" width="15" height="75" fill="#f97316"/>

  <!-- Metrics cards -->
  <rect x="40" y="230" width="80" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="50" y="240" width="30" height="8" rx="2" fill="#1e293b"/>
  <rect x="50" y="252" width="20" height="6" rx="1" fill="#64748b"/>

  <rect x="140" y="230" width="80" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="150" y="240" width="30" height="8" rx="2" fill="#1e293b"/>
  <rect x="150" y="252" width="20" height="6" rx="1" fill="#64748b"/>

  <rect x="240" y="230" width="80" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="250" y="240" width="30" height="8" rx="2" fill="#1e293b"/>
  <rect x="250" y="252" width="20" height="6" rx="1" fill="#64748b"/>
</svg>